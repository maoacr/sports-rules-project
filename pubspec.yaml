name: sports_rules_app
description: A sports rules platform with freemium model.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Dependency injection
  get_it: ^7.7.0

  # Navigation
  go_router: ^14.2.7

  # Firebase
  firebase_core: ^3.5.0
  firebase_auth: ^5.2.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.2.0
  firebase_remote_config: ^5.5.0

  # RevenueCat
  purchases_flutter: ^7.0.0

  # Local storage
  # isar 3.1.0+1 (last published by the original author) is incompatible
  # with the current Dart SDK toolchain. We use the community fork
  # `isar_community` (3.3.2, the last release before the community repo
  # was archived) which keeps the same API and a working code generator.
  # Tracked tech debt: migrate to `drift` when the project grows beyond
  # local cache. See docs/KNOWN_ISSUES.md K-1 / K-3.
  isar_community: ^3.3.2
  isar_community_flutter_libs: ^3.3.2
  shared_preferences: ^2.3.2
  path_provider: ^2.1.5

  # Utils
  dartz: ^0.10.1
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  share_plus: ^10.0.2
  url_launcher: ^6.3.0
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^5.0.0
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4
  isar_community_generator: ^3.3.2
  build_runner: ^2.15.0
  # Force the new frontend_server_client (4.x) which knows how to fall
  # back to the AOT snapshot that ships with Flutter 3.38+. Without
  # this override, build_runner pulls 3.x which expects the legacy
  # debug-only snapshot and fails on this SDK.
  frontend_server_client: ^4.0.0

flutter:
  uses-material-design: true
