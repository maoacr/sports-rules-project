name: Bug Report
description: Report a bug or unexpected behavior
title: "fix(scope): short description"
labels: ["bug", "status:needs-review"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in the template below.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight Checks
      description: Please confirm before submitting.
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I understand this issue needs `status:approved` before a PR can be opened
          required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of the bug.
      placeholder: What's broken?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Numbered, minimal steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What happened instead? Include error logs if any.
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which platform is affected?
      options:
        - iOS
        - Android
        - Both
        - Web
        - Backend
        - CI
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste logs inside a fenced code block.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, workarounds, anything else relevant.
